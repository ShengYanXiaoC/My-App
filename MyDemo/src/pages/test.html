<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>瀑布流 - 无重叠修复版 (Range请求解析尺寸)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8f9fa;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .scroll-container {
            height: calc(100vh - 150px);
            overflow-y: auto;
            border-radius: 20px;
            background: #f1f5f9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .card {
            border-radius: 20px;
            background: white;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
        }

        .image-wrapper {
            width: 100%;
            background-color: #e2e8f0;
        }

        .card-img {
            width: 100%;
            display: block;
        }

        .card-content {
            padding: 12px 14px 16px;
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #475569;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loader-more {
            text-align: center;
            padding: 20px;
            color: #3b82f6;
            font-weight: 500;
        }

        .skeleton-card {
            background: #e2e8f0;
            border-radius: 20px;
            height: 300px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .scroll-container::-webkit-scrollbar {
            width: 8px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19.2.6",
            "react-dom/client": "https://esm.sh/react-dom@19.2.6/client",
            "@tanstack/react-virtual": "https://esm.sh/@tanstack/react-virtual@3.13.24"
        }
    }
</script>

    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import { useVirtualizer } from '@tanstack/react-virtual';

        // ========== 快速图片尺寸解析 (Range请求，仅下载头部) ==========
        async function getImageSizeFast(url) {
            // 尝试 Range 请求
            let res;
            try {
                res = await fetch(url, { headers: { Range: 'bytes=0-4095' } });
            } catch (e) {
                return fallbackGetImageSize(url);
            }
            if (!res.ok && res.status !== 206) {
                return fallbackGetImageSize(url);
            }
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            const magic = new Uint8Array(buf.slice(0, 12));

            // JPEG
            if (magic[0] === 0xFF && magic[1] === 0xD8 && magic[2] === 0xFF) {
                let offset = 2;
                while (offset < buf.byteLength) {
                    if (view.getUint8(offset) !== 0xFF) break;
                    const marker = view.getUint8(offset + 1);
                    if (marker === 0xC0 || marker === 0xC2) {
                        const height = view.getUint16(offset + 5);
                        const width = view.getUint16(offset + 7);
                        return { width, height };
                    }
                    offset += 2 + view.getUint16(offset + 2);
                }
            }
            // PNG
            if (magic[0] === 0x89 && magic[1] === 0x50 && magic[2] === 0x4E && magic[3] === 0x47) {
                const width = view.getUint32(16);
                const height = view.getUint32(20);
                return { width, height };
            }
            // GIF
            if (magic[0] === 0x47 && magic[1] === 0x49 && magic[2] === 0x46 && magic[3] === 0x38) {
                const width = view.getUint16(6, true);
                const height = view.getUint16(8, true);
                return { width, height };
            }
            // WebP 简化处理
            if (magic[0] === 0x52 && magic[1] === 0x49 && magic[2] === 0x46 && magic[3] === 0x46 &&
                magic[8] === 0x57 && magic[9] === 0x45 && magic[10] === 0x42 && magic[11] === 0x50) {
                const format = view.getUint32(12);
                if (format === 0x56503820) { // VP8
                    const width = view.getUint16(26) & 0x3FFF;
                    const height = view.getUint16(28) & 0x3FFF;
                    return { width, height };
                } else if (format === 0x5650384C) { // VP8L
                    const bits = view.getUint32(21);
                    const width = (bits & 0x3FFF) + 1;
                    const height = ((bits >> 14) & 0x3FFF) + 1;
                    return { width, height };
                }
            }
            // 降级
            return fallbackGetImageSize(url);
        }

        async function fallbackGetImageSize(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
                img.onerror = () => reject(new Error('fallback failed'));
                img.src = url;
            });
        }

        // ========== 生成模拟数据（URL 自带随机高度）==========
        const titles = ["山间薄雾", "城市光影", "静谧森林", "汪洋海风", "落日余晖", "晨曦微露", "极光之舞", "沙漠星空", "樱花雨", "雪中木屋"];
        const descs = [
            "大自然最温柔的笔触，让人心旷神怡。",
            "现代与传统的交织，每一帧都是故事。",
            "呼吸清新的空气，治愈一整天的疲惫。",
            "听海浪拍岸，感受自由的风。",
            "天空被染成橘子汽水的颜色。",
            "新的一天，从第一缕光开始。",
            "神秘缥缈，像是另一个世界的入口。",
            "亿万星辰为你闪烁，浩瀚而寂静。",
            "短暂而绚烂，落英缤纷。",
            "雪覆盖了喧嚣，只剩下纯粹。"
        ];

        const generateRawItems = (startId, count) => {
            const items = [];
            for (let i = 0; i < count; i++) {
                const id = startId + i;
                const height = 200 + Math.floor(Math.random() * 380);
                const imgUrl = `https://picsum.photos/id/${(id % 100) + 1}/400/${height}`;
                const title = titles[id % titles.length] + (Math.random() > 0.7 ? " · 特别版" : "");
                const desc = descs[id % descs.length] + (Math.random() > 0.8 ? " 更多内容……" : "");
                items.push({ id, title, description: desc, image: imgUrl });
            }
            return items;
        };

        // ========== 卡片组件（支持动态更新宽高比，并通知虚拟化器重新测量）==========
        const Card = React.memo(({ item, ratio, onMeasure }) => {
            const wrapperRef = React.useRef(null);
            const [currentRatio, setCurrentRatio] = React.useState(ratio);

            // 当 ratio 变化时（预检完成），更新 wrapper 的 aspect-ratio
            React.useEffect(() => {
                if (wrapperRef.current && ratio !== currentRatio) {
                    setCurrentRatio(ratio);
                    // 高度变化后，通知虚拟化器重新测量此卡片
                    if (onMeasure) onMeasure();
                }
            }, [ratio, onMeasure]);

            const wrapperStyle = {
                aspectRatio: `${1 / (currentRatio || 0.75)}`,
                transition: 'aspect-ratio 0.2s ease-out'
            };

            return React.createElement('div', { className: 'card' },
                React.createElement('div', { ref: wrapperRef, className: 'image-wrapper', style: wrapperStyle },
                    React.createElement('img', {
                        src: item.image,
                        alt: item.title,
                        className: 'card-img',
                        loading: 'lazy'
                    })
                ),
                React.createElement('div', { className: 'card-content' },
                    React.createElement('div', { className: 'card-title' }, item.title),
                    React.createElement('div', { className: 'card-desc' }, item.description)
                )
            );
        });

        const SkeletonCard = () => React.createElement('div', { className: 'skeleton-card' });

        // ========== 主应用 ==========
        const App = () => {
            const [status, setStatus] = React.useState('loading'); // 'loading', 'ready'
            const [items, setItems] = React.useState([]);
            const [sizeMap, setSizeMap] = React.useState(new Map()); // url -> ratio
            const scrollRef = React.useRef(null);
            const [lanesCount, setLanesCount] = React.useState(3);
            const [containerWidth, setContainerWidth] = React.useState(0);
            const gap = 20;

            // 1. 初始化：生成原始数据，并行获取尺寸
            React.useEffect(() => {
                const raw = generateRawItems(0, 40);
                setItems(raw);
                const urlList = raw.map(i => i.image);
                Promise.all(urlList.map(url => getImageSizeFast(url).catch(() => ({ width: 400, height: 300 }))))
                    .then(sizes => {
                        const map = new Map();
                        raw.forEach((item, idx) => {
                            const { width, height } = sizes[idx];
                            const ratio = height / width;
                            map.set(item.image, ratio);
                        });
                        setSizeMap(map);
                        setStatus('ready');
                    });
            }, []);

            // 2. 响应式列数 & 容器宽度监听
            React.useEffect(() => {
                const container = scrollRef.current;
                if (!container) return;
                const updateDimensions = () => {
                    const width = container.clientWidth;
                    setContainerWidth(width);
                    if (width >= 1100) setLanesCount(4);
                    else if (width >= 750) setLanesCount(3);
                    else if (width >= 480) setLanesCount(2);
                    else setLanesCount(1);
                };
                updateDimensions();
                const resizeObserver = new ResizeObserver(() => updateDimensions());
                resizeObserver.observe(container);
                return () => resizeObserver.disconnect();
            }, []);

            // 3. 虚拟化器配置
            const virtualizer = useVirtualizer({
                count: status === 'ready' ? (items.length + 1) : 40, // +1 为加载更多指示器
                lanes: lanesCount,
                estimateSize: React.useCallback(() => {
                    // 粗略估算：图片部分约占宽度的 0.75 比例，加上内容区 100px
                    const avgImgHeight = (containerWidth / lanesCount) * 0.75;
                    return avgImgHeight + 100;
                }, [containerWidth, lanesCount]),
                getScrollElement: () => scrollRef.current,
                overscan: 4,
                measureElement: (element) => element?.getBoundingClientRect().height,
            });

            const virtualItems = virtualizer.getVirtualItems();
            const itemWidth = containerWidth ? (containerWidth - (lanesCount - 1) * gap) / lanesCount : 0;

            // 4. 滚动加载更多
            const [isLoadingMore, setIsLoadingMore] = React.useState(false);
            const hasMore = items.length < 300;

            React.useEffect(() => {
                if (status !== 'ready') return;
                const lastItem = virtualItems[virtualItems.length - 1];
                if (!lastItem) return;
                if (hasMore && !isLoadingMore && lastItem.index >= items.length - 1) {
                    setIsLoadingMore(true);
                    const newRaw = generateRawItems(items.length, 20);
                    const newUrls = newRaw.map(i => i.image);
                    Promise.all(newUrls.map(url => getImageSizeFast(url).catch(() => ({ width: 400, height: 300 }))))
                        .then(sizes => {
                            const newMap = new Map(sizeMap);
                            newRaw.forEach((item, idx) => {
                                const { width, height } = sizes[idx];
                                const ratio = height / width;
                                newMap.set(item.image, ratio);
                            });
                            setSizeMap(newMap);
                            setItems(prev => [...prev, ...newRaw]);
                            setIsLoadingMore(false);
                        });
                }
            }, [virtualItems, status, hasMore, isLoadingMore, items.length, sizeMap]);

            // 5. 辅助函数：通知虚拟化器重新测量某个卡片（由 Card 内部调用）
            const notifyMeasure = React.useCallback(() => {
                // 调用 virtualizer.measure() 会触发对所有已挂载元素的重新测量
                virtualizer.measure();
            }, [virtualizer]);

            // 6. 渲染单个项目
            const renderItem = (virtualItem) => {
                if (status === 'loading') {
                    const left = virtualItem.lane * (itemWidth + gap);
                    return React.createElement('div', {
                        key: virtualItem.key,
                        style: {
                            position: 'absolute',
                            top: 0,
                            left: `${left}px`,
                            width: `${itemWidth}px`,
                            transform: `translateY(${virtualItem.start}px)`,
                            paddingBottom: `${gap}px`,
                        }
                    }, React.createElement(SkeletonCard, null));
                }

                const isLoaderRow = virtualItem.index >= items.length;
                const left = virtualItem.lane * (itemWidth + gap);

                if (isLoaderRow) {
                    return React.createElement('div', {
                        key: virtualItem.key,
                        style: {
                            position: 'absolute',
                            top: 0,
                            left: `${left}px`,
                            width: `${itemWidth}px`,
                            transform: `translateY(${virtualItem.start}px)`,
                            paddingBottom: `${gap}px`,
                        }
                    }, React.createElement('div', { className: 'loader-more' }, isLoadingMore ? '⏳ 加载更多...' : '✨ 已经到底了 ✨'));
                }

                const item = items[virtualItem.index];
                const ratio = sizeMap.get(item.image) || 0.75;
                // 关键：绑定 ref 到虚拟化器的 measureElement
                return React.createElement('div', {
                    key: virtualItem.key,
                    'data-index': virtualItem.index,
                    ref: virtualizer.measureElement,
                    style: {
                        position: 'absolute',
                        top: 0,
                        left: `${left}px`,
                        width: `${itemWidth}px`,
                        transform: `translateY(${virtualItem.start}px)`,
                        paddingBottom: `${gap}px`,
                    }
                }, React.createElement(Card, { item, ratio, onMeasure: notifyMeasure }));
            };

            return React.createElement('div', { className: 'app-container' },
                React.createElement('h1', null, '📸 瀑布流 · 无重叠修复版'),
                React.createElement('div', { className: 'sub' }, `Range请求解析尺寸 | 动态测量 | 绝对无重叠 | 间距${gap}px | ${lanesCount}列`),
                React.createElement('div', { ref: scrollRef, className: 'scroll-container' },
                    React.createElement('div', {
                        style: {
                            position: 'relative',
                            height: `${virtualizer.getTotalSize()}px`,
                            width: '100%'
                        }
                    }, virtualItems.map(renderItem))
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
